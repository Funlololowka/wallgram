<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="160" height="80" cursor="pointer" onclick="toggle()">
    <style>
        /* Стили вшиты прямо в SVG */
        .bg {
            fill: #cbd5e1;
            transition: fill 0.5s ease;
        }
        .dark-mode .bg {
            fill: #334155;
        }
        
        .thumb {
            fill: #ffffff;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark-mode .thumb {
            transform: translateX(40px);
            fill: #1e293b;
        }

        .icon {
            color: #f59e0b; /* Цвет солнца */
            transition: color 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 20px 20px;
        }
        .dark-mode .icon {
            color: #e2e8f0; /* Цвет луны */
            transform: translateX(40px) rotate(-30deg);
        }

        .sun-core {
            transform-origin: 20px 20px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.625);
        }
        .dark-mode .sun-core {
            transform: scale(1);
        }

        .moon-mask-cut {
            transform-origin: 20px 20px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate(8px, -8px);
        }
        .dark-mode .moon-mask-cut {
            transform: translate(0, 0);
        }

        .sun-rays {
            transform-origin: 20px 20px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }
        .dark-mode .sun-rays {
            transform: scale(0.2) rotate(45deg);
            opacity: 0;
        }
    </style>

    <defs>
        <mask id="moon-mask">
            <rect x="0" y="0" width="80" height="40" fill="white" />
            <circle class="moon-mask-cut" cx="24" cy="16" r="6" fill="black" />
        </mask>
    </defs>

    <!-- Фон переключателя -->
    <rect class="bg" width="80" height="40" rx="20" />
    
    <!-- Ползунок -->
    <circle class="thumb" cx="20" cy="20" r="16" />

    <!-- Группа иконки -->
    <g class="icon">
        <circle class="sun-core" cx="20" cy="20" r="6" fill="currentColor" mask="url(#moon-mask)" />
        <g class="sun-rays" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="20" y1="9" x2="20" y2="12" />
            <line x1="20" y1="28" x2="20" y2="31" />
            <line x1="12.2" y1="12.2" x2="14.3" y2="14.3" />
            <line x1="25.7" y1="25.7" x2="27.8" y2="27.8" />
            <line x1="9" y1="20" x2="12" y2="20" />
            <line x1="28" y1="20" x2="31" y2="20" />
            <line x1="12.2" y1="27.8" x2="14.3" y2="25.7" />
            <line x1="25.7" y1="14.3" x2="27.8" y2="12.2" />
        </g>
    </g>

    <!-- Встроенный скрипт переключения состояния -->
    <script>
        function toggle() {
            // document.documentElement внутри SVG указывает на сам тег <svg>
            document.documentElement.classList.toggle('dark-mode');
        }
    </script>
</svg>